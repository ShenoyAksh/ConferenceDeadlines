name: Update and Deploy Site

on:
  workflow_dispatch:
  schedule:
    # Run every three months on the first day of the month at 03:15 UTC.
    - cron: "15 3 1 */3 *"
  push:
    branches:
      - main
    paths:
      - "site/**"
      - ".github/workflows/update-site.yml"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  refresh:
    name: Refresh Conference Data
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Download CORE export and create area sheets
        run: python run_core_pipeline.py 4612 --skip-deadlines --timeout 60

      - name: Scrape Researchr deadlines
        run: >
          python scrape_core_area_deadlines.py 4612
          -i CORE_by_area.xlsx
          -o deadline.xlsx
          --overwrite
          --include-ranks "A*" A B
          --years 2027 2026
          --queries-per-year 0
          --pages-per-year 4
          --child-links 8
          --timeout 12
          --delay 0.05
          --cache ""

      - name: Build website data
        run: python build_site_data.py deadline.xlsx

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CORE.csv CORE_by_area.xlsx deadline.xlsx site/data.js
          if git diff --cached --quiet; then
            echo "No generated data changes to commit."
          else
            git commit -m "Refresh conference deadline data"
            git push
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy-after-refresh:
    name: Deploy Refreshed Site
    if: github.event_name != 'push'
    needs: refresh
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deploy:
    name: Deploy Site
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
